<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #todoInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-add {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: #666;
            font-weight: 500;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .todo-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
            background: white;
        }

        .todo-item:hover {
            background: #f9f9f9;
            padding-left: 25px;
        }

        .todo-item.completed {
            opacity: 0.7;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .todo-text {
            font-size: 1rem;
            color: #333;
            word-break: break-word;
            margin-bottom: 5px;
        }

        .todo-meta {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: #999;
        }

        .priority-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .priority-high {
            background: #ffebee;
            color: #c62828;
        }

        .priority-medium {
            background: #fff3e0;
            color: #e65100;
        }

        .priority-low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .todo-date {
            color: #999;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit:hover {
            background: #bbdefb;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        .btn-delete:hover {
            background: #ffcdd2;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        .stats {
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            font-size: 0.9rem;
        }

        .stat {
            padding: 10px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .footer {
            padding: 15px 20px;
            text-align: center;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #999;
        }

        .btn-clear-all {
            background: #ffebee;
            color: #c62828;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-clear-all:hover {
            background: #ffcdd2;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-close {
            color: #999;
            float: right;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-modal {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #5568d3;
        }

        .btn-cancel {
            background: #eee;
            color: #333;
        }

        .btn-cancel:hover {
            background: #ddd;
        }

        .scrollbar-hide::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-hide::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-hide::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .scrollbar-hide::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .filter-buttons {
                flex-wrap: wrap;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-list-check"></i> My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="Add a new task..."
                    autocomplete="off"
                />
                <button class="btn-add" onclick="addTodo()">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterTodos('all')">
                    <i class="fas fa-th-large"></i> All
                </button>
                <button class="filter-btn" onclick="filterTodos('pending')">
                    <i class="fas fa-clock"></i> Pending
                </button>
                <button class="filter-btn" onclick="filterTodos('completed')">
                    <i class="fas fa-check-circle"></i> Completed
                </button>
            </div>
        </div>

        <div class="todo-list scrollbar-hide" id="todoList"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-clear-all" onclick="clearCompleted()">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">Edit Task</div>

            <div class="form-group">
                <label for="editTodoInput">Task Description</label>
                <input type="text" id="editTodoInput" placeholder="Enter task description">
            </div>

            <div class="form-group">
                <label for="editPriority">Priority</label>
                <select id="editPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="editDueDate">Due Date</label>
                <input type="date" id="editDueDate">
            </div>

            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-modal btn-save" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Local Storage Manager
        const StorageManager = {
            key: 'todos',

            getTodos() {
                const todos = localStorage.getItem(this.key);
                return todos ? JSON.parse(todos) : [];
            },

            saveTodos(todos) {
                localStorage.setItem(this.key, JSON.stringify(todos));
            },

            addTodo(todo) {
                const todos = this.getTodos();
                todos.push({
                    id: Date.now(),
                    text: todo.text,
                    completed: false,
                    priority: todo.priority || 'medium',
                    dueDate: todo.dueDate || '',
                    createdAt: new Date().toISOString()
                });
                this.saveTodos(todos);
                return todos;
            },

            updateTodo(id, todo) {
                const todos = this.getTodos();
                const index = todos.findIndex(t => t.id === id);
                if (index !== -1) {
                    todos[index] = { ...todos[index], ...todo };
                    this.saveTodos(todos);
                }
                return todos;
            },

            deleteTodo(id) {
                const todos = this.getTodos();
                const filtered = todos.filter(t => t.id !== id);
                this.saveTodos(filtered);
                return filtered;
            }
        };

        // App State
        let currentFilter = 'all';
        let editingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTodos();
            document.getElementById('todoInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTodo();
            });
        });

        // Add Todo
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            StorageManager.addTodo({ text, priority: 'medium' });
            input.value = '';
            renderTodos();
        }

        // Render Todos
        function renderTodos() {
            const todos = StorageManager.getTodos();
            const filtered = filterTodoList(todos);
            const todoList = document.getElementById('todoList');

            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No tasks ${currentFilter !== 'all' ? 'in this filter' : 'yet'}!</p>
                    </div>
                `;
                updateStats(todos);
                return;
            }

            todoList.innerHTML = filtered
                .sort((a, b) => {
                    const priorityOrder = { high: 0, medium: 1, low: 2 };
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                })
                .map(todo => `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <input
                            type="checkbox"
                            class="checkbox"
                            ${todo.completed ? 'checked' : ''}
                            onchange="toggleTodo(${todo.id})"
                        />
                        <div class="todo-content">
                            <span class="todo-text">${escapeHtml(todo.text)}</span>
                            <div class="todo-meta">
                                <span class="priority-badge priority-${todo.priority}">
                                    ${todo.priority}
                                </span>
                                ${todo.dueDate ? `<span class="todo-date"><i class="fas fa-calendar"></i> ${formatDate(todo.dueDate)}</span>` : ''}
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="openEditModal(${todo.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-action btn-delete" onclick="deleteTodo(${todo.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `)
                .join('');

            updateStats(todos);
        }

        // Filter Todos
        function filterTodoList(todos) {
            switch (currentFilter) {
                case 'pending':
                    return todos.filter(t => !t.completed);
                case 'completed':
                    return todos.filter(t => t.completed);
                default:
                    return todos;
            }
        }

        // Filter Button Handler
        function filterTodos(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.filter-btn').classList.add('active');
            renderTodos();
        }

        // Toggle Todo
        function toggleTodo(id) {
            const todos = StorageManager.getTodos();
            const todo = todos.find(t => t.id === id);
            if (todo) {
                StorageManager.updateTodo(id, { completed: !todo.completed });
                renderTodos();
            }
        }

        // Delete Todo
        function deleteTodo(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                StorageManager.deleteTodo(id);
                renderTodos();
            }
        }

        // Edit Modal
        function openEditModal(id) {
            editingId = id;
            const todos = StorageManager.getTodos();
            const todo = todos.find(t => t.id === id);

            if (todo) {
                document.getElementById('editTodoInput').value = todo.text;
                document.getElementById('editPriority').value = todo.priority;
                document.getElementById('editDueDate').value = todo.dueDate || '';
                document.getElementById('editModal').style.display = 'block';
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingId = null;
        }

        function saveEdit() {
            const text = document.getElementById('editTodoInput').value.trim();
            const priority = document.getElementById('editPriority').value;
            const dueDate = document.getElementById('editDueDate').value;

            if (!text) {
                alert('Please enter a task description!');
                return;
            }

            StorageManager.updateTodo(editingId, { text, priority, dueDate });
            closeEditModal();
            renderTodos();
        }

        // Clear Completed
        function clearCompleted() {
            if (confirm('Delete all completed tasks?')) {
                const todos = StorageManager.getTodos();
                const remaining = todos.filter(t => !t.completed);
                StorageManager.saveTodos(remaining);
                renderTodos();
            }
        }

        // Update Stats
        function updateStats(todos) {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Utility Functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        };
    </script>
</body>
</html>
